name: Bug report (English)
description: Report a failed claim, login problem, captcha issue, or checkout problem
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please provide the GitHub Actions run link only. You do not need to download and upload artifacts manually.

        How to find the link:
        Open the failed or suspicious workflow run, enter the specific job page, then copy the URL from your browser address bar and paste it below. A typical link looks like `https://github.com/<your-account>/<your-repo>/actions/runs/24829120566/job/72672761254`. Maintainers can use that link to inspect the full logs and runtime artifacts in Actions.

  - type: input
    id: workflow_run_url
    attributes:
      label: GitHub Actions run URL
      description: Paste the full URL of the failed or suspicious workflow run. A job URL is preferred.
      placeholder: https://github.com/<your-account>/<your-repo>/actions/runs/24829120566/job/72672761254
    validations:
      required: true

  - type: dropdown
    id: problem_type
    attributes:
      label: Problem type
      options:
        - Login failed
        - Captcha failed
        - Checkout failed
        - Workflow showed success but the game was not claimed
        - The game was already claimed but the script did not recognize it
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead
      placeholder: For example, the workflow kept running for a long time and then finished, but the game was already in the library / was still missing / etc.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Keep the steps short and concrete. Include whether this was a manual run or a scheduled run.
      placeholder: |
        1. Forked the repo
        2. Configured secrets
        3. Ran the workflow manually
        4. The issue happened during login / checkout / after "Place Order"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Optional. Add screenshots, suspected cause, environment details, or anything else useful. You can also add screenshots in a follow-up comment after creating the issue.
